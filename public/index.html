<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>夜渡汤馆</title><link rel="stylesheet" href="/styles.css"></head><body><main class="shell"><section class="hero"><div><p class="eyebrow">MIDNIGHT TURTLE SOUP</p><h1>夜渡汤馆</h1><p class="tagline">一盏灯，一碗汤。你只能问“是”与“不是”，把沉在碗底的真相捞出来。</p></div><div class="bowl" aria-hidden="true"><span></span></div></section><section class="panel setup"><label>气质<select id="mood"><option>悬疑</option><option>温柔反转</option><option>都市怪谈</option><option>冷幽默</option></select></label><label>难度<select id="difficulty"><option>标准</option><option>入门</option><option>硬核</option></select></label><button id="newCase">开一锅新汤</button></section><section class="case-card"><div class="case-top"><span id="source">等待开锅</span><button id="reveal">揭晓</button></div><h2 id="title">请先开一锅新汤</h2><p id="soup">老板正在擦拭木勺。配置 OpenAI 兼容接口后可生成原创题；未配置时会使用本地题库。</p></section><section id="log" class="log" aria-live="polite"></section><form id="askForm" class="ask"><input id="question" placeholder="例如：这个人是在害怕吗？" autocomplete="off"><button>追问</button></form><aside class="rules"><b>玩法</b><span>尽量问能用“是 / 不是”回答的问题。</span><span>卡住时问：这和地点、身份、时间、物品有关吗？</span></aside></main><script src="/app.js"></script></body></html>
